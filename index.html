<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cielo Batalha de Vendas</title>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script>
    window.addEventListener('load', () => {
        console.log('Phaser carregado?', typeof Phaser !== 'undefined');
        console.log('TelaInicial:', typeof TelaInicial);
        console.log('CharacterSelectScene:', typeof CharacterSelectScene);
        console.log('CharacterInfoScene:', typeof CharacterInfoScene);
        console.log('CharacterInfoScene2:', typeof CharacterInfoScene2);
        console.log('CharacterInfoScene3:', typeof CharacterInfoScene3);
        console.log('CharacterInfoScene4:', typeof CharacterInfoScene4);
        console.log('CidadeScene:', typeof CidadeScene);
        console.log('Farmacia:', typeof Farmacia);
        console.log('LojaDeRoupa:', typeof LojaDeRoupa);
        console.log('Padaria:', typeof Padaria);
        console.log('SalaoDeBeleza:', typeof SalaoDeBeleza);
    });
    </script>
    <style>
        /* Estilos globais da página */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Fundo escuro */
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Evita que a tela crie barras de rolagem */
        }

        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Estilo aplicado diretamente à tela do jogo */
        canvas {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15); /* Efeito de sombra leve */
            display: block;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <!-- Tela Inicial -->
    <script src="src/telainicial.js"></script>

    <!-- Seleção e Info de Personagens -->
    <script src="src/personagens.js"></script>
    <script src="src/infopersonagens.js"></script>

    <!-- Cenas de Jogo -->
    <script src="src/main.js"></script>
    <script src="src/game.js"></script>

    <!-- Cenas Internas das Lojas -->
    <script src="src/Farmacia.js"></script>
    <script src="src/LojaDeRoupa.js"></script>
    <script src="src/Padaria.js"></script>
    <script src="src/SalaoDeBeleza.js"></script>

    <!-- Config — deve ser o último script carregado -->
    <script src="src/config.js"></script>

</body>
</html>
