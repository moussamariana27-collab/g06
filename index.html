<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre de Vendas</title>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
            display: block;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <!-- Tela Inicial -->
    <script src="src/scenes/menu/telainicial.js"></script>

    <!-- Seleção e Info de Personagens -->
    <script src="src/scenes/menu/personagens.js"></script>
    <script src="src/scenes/menu/infopersonagens.js"></script>

    <!-- Cenas de Jogo -->
    <script src="src/scenes/gameplay/main.js"></script>
    <script src="src/scenes/gameplay/game.js"></script>
    <script src="src/scenes/gameplay/tutorial.js"></script>

    <!-- Cenas Internas das Lojas -->
    <script src="src/scenes/estabelecimentos/Farmacia.js"></script>
    <script src="src/scenes/estabelecimentos/LojaDeRoupa.js"></script>
    <script src="src/scenes/estabelecimentos/Padaria.js"></script>
    <script src="src/scenes/estabelecimentos/SalaoDeBeleza.js"></script>

    <!-- Config — deve ser o último script carregado -->
    <script src="src/config/config.js"></script>

</body>
</html>
