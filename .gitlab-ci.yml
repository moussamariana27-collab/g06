image: alpine:latest

pages:
  stage: deploy
  before_script:
    - apk add --no-cache imagemagick
  script:
    - mkdir -p .public
    - |
      for img in src/assets/*.png; do
        echo "Otimizando $img"
        convert "$img" -strip -quality 85 "$img"
      done
    - cp -r src/* .public/
    - cp index.html .public/
    - mv .public public
  artifacts:
    paths:
      - public
  only:
    - main