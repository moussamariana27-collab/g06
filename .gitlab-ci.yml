pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp index.html public/        # index na raiz de public
    - cp -r src public/            # mantém public/src/...
    - cp -r assets public/         # mantém public/assets/...
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"